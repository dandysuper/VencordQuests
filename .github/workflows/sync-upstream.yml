name: Sync with Upstream Vencord

on:
    schedule:
        - cron: "0 4 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout fork
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Save custom plugin files
              run: |
                  mkdir -p /tmp/plugin-backup
                  cp -r src/plugins/completeDiscordQuest /tmp/plugin-backup/

            - name: Add upstream remote
              run: |
                  git remote add upstream https://github.com/Vendicated/Vencord.git || true
                  git fetch upstream main

            - name: Check if already up to date
              id: check
              run: |
                  UPSTREAM_SHA=$(git rev-parse upstream/main)
                  MERGE_BASE=$(git merge-base HEAD upstream/main)
                  if [ "$MERGE_BASE" = "$UPSTREAM_SHA" ]; then
                    echo "up_to_date=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "up_to_date=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Attempt merge
              if: steps.check.outputs.up_to_date == 'false'
              id: merge
              run: |
                  git merge upstream/main --no-edit || echo "CONFLICT=true" >> "$GITHUB_OUTPUT"

            - name: Restore custom plugin after merge
              if: steps.check.outputs.up_to_date == 'false'
              run: |
                  cp -r /tmp/plugin-backup/completeDiscordQuest src/plugins/
                  if ! git diff --quiet src/plugins/completeDiscordQuest; then
                    git add src/plugins/completeDiscordQuest
                    git commit -m "chore: restore completeDiscordQuest plugin after upstream merge" --no-edit || true
                  fi

            - name: Push if clean merge
              if: steps.check.outputs.up_to_date == 'false' && steps.merge.outputs.CONFLICT != 'true'
              run: git push origin main

            - name: Create PR on conflict
              if: steps.check.outputs.up_to_date == 'false' && steps.merge.outputs.CONFLICT == 'true'
              run: |
                  BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
                  git merge --abort
                  git checkout -b "$BRANCH"
                  git merge upstream/main --no-edit || true
                  cp -r /tmp/plugin-backup/completeDiscordQuest src/plugins/
                  git add -A
                  git commit -m "chore: merge upstream Vencord with completeDiscordQuest plugin" || true
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Upstream sync conflict - $(date +%Y-%m-%d)" \
                    --body "Automatic upstream sync encountered merge conflicts. The completeDiscordQuest plugin files have been preserved. Please resolve remaining conflicts manually." \
                    --base main \
                    --head "$BRANCH"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
