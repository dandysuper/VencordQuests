name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

env:
    FORCE_COLOR: true
    NODE_OPTIONS: "--max-old-space-size=1536"

jobs:
    build:
        runs-on: self-hosted

        steps:
            - uses: actions/checkout@v4

            - name: Restore cached node_modules
              run: |
                  if [ -d /opt/vencord-deps/node_modules ]; then
                    cp -al /opt/vencord-deps/node_modules ./node_modules
                    echo "Restored node_modules from pre-built image cache"
                  else
                    echo "No cached node_modules found, running pnpm install"
                    pnpm install --frozen-lockfile --network-concurrency 1
                  fi

            - name: Build standalone
              run: pnpm buildStandalone

            - name: Build web
              run: pnpm buildWeb
