name: CI

on:
    push:
        branches:
            - main
        paths:
            - .github/workflows/ci.yml
            - src/**
            - browser/**
            - scripts/**
            - packages/**
            - package.json
            - pnpm-lock.yaml
            - tsconfig.json
            - eslint.config.mjs
    pull_request:
        branches:
            - main

env:
    FORCE_COLOR: true

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build & Lint & Type-check
              run: pnpm test

            - name: Test web build
              run: pnpm buildWeb
